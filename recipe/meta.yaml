{% set name = "pycontracts" %}
{% set version = "1.8.12" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/PyContracts-{{ version }}.tar.gz
  sha256: e76adbd832deec28b2045a6094c5bb779a0b2cb1105a23b3efafe723e2c9937a

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - decorator ==4.0.10
    - future
    - numpy <1.16
    - pyparsing ==2.2.2
    - python >={{ python_min }},<3.10
    - six ==1.10.0

test:
  imports:
    - contracts
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/AndreaCensi/contracts
  doc_url: http://andreacensi.github.com/contracts/
  summary: Declare constraints on function parameters and return values
  license: LGPL-3.0-or-later
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - thewchan
